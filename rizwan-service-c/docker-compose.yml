services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: expedition-service-app
    container_name: expedition-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - expedition-network

  nginx:
    image: nginx:alpine
    container_name: expedition-nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - expedition-network

networks:
  expedition-network:
    driver: bridge
